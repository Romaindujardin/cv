<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CV Romain</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="wrapper-horizontal-1">
        <section class="panel section1">
            <canvas id='scene'></canvas>
            <div class="navbar">
                <div class="navbar-left">
                    <a href="#" class="btn-flip" data-back="ROMAIN" data-front="ROMAIN"></a>
                </div>
                <div class="navbar-right">
                    <a href="#mes_project" class="btn-flip" data-back="Project" data-front="Project"></a>
                    <a href="#" class="btn-flip" data-back="About" data-front="About"></a>
                    <a href="#" class="btn-flip" data-back="Contact" data-front="Contact"></a>
                </div>
            </div>
        </section>
        <section class="panel section2" id="mes_project">MES PROJETS</section>
    </div>



    <section class="section3">
        <div class="bubbles-container">
            <div class="bubble-row">
                <div class="bubble-with-text left">
                    <div class="bubble"></div>
                    <p>Texte à droite</p>
                </div>
            </div>
            <div class="bubble-row">
                <div class="bubble-with-text right inverted">
                    <p>Texte à gauche</p>
                    <div class="bubble"></div>
                </div>
            </div>
        </div>
    </section>

    <section class="section4">
        <div class="bubbles-container">
            <div class="bubble-row">
                <div class="bubble-with-text left">
                    <div class="bubble"></div>
                    <p>Texte à droite</p>
                </div>
            </div>
            <div class="bubble-row">
                <div class="bubble-with-text right inverted">
                    <p>Texte à gauche</p>
                    <div class="bubble"></div>
                </div>
            </div>
        </div>
    </section>

    <div class="wrapper-horizontal-2">
        <div class="wrapper-horizontal-2">
            <section class="panel section5">
                <div class="timeline">
                    <div class="progress-line"></div>
                    <div class="timeline-item top">Item 1</div>
                    <div class="timeline-item bottom">Item 2</div>
                    <div class="timeline-item top">Item 3</div>
                    <div class="timeline-item bottom">Item 4</div>
                </div>
            </section>
            <section class="panel section6">
                <div class="timeline">
                    <div class="progress-line"></div>
                    <div class="timeline-item top">Item 5</div>
                    <div class="timeline-item bottom">Item 6</div>
                    <div class="timeline-item top">Item 7</div>
                    <div class="timeline-item bottom">Item 8</div>
                </div>
            </section>
        </div>


    </div>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.1/gsap.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.1/ScrollTrigger.min.js'></script>
    <script src="./script.js"></script>
</body>

</html>
